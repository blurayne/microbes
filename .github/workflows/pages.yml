name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/cell-splitting-metaball-hcdrO
      - claude/webgl-renderer
      - claude/webgl-phase9
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stamp build info
        run: |
          DATE_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > assets/build.js <<EOF
          window.__BUILD__ = {
            sha: '${{ github.sha }}',
            run: ${{ github.run_number }},
            dateUtc: '${DATE_UTC}'
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
