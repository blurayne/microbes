name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build docs
        # mkdocs.yml at repo root reads docs/ and writes book/.
        # The output rides along in the upload-pages-artifact below
        # since `path: .` ships the whole working tree, so the book
        # is reachable at /microbes/book/ on the deployed site.
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stamp build info
        run: |
          DATE_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > assets/build.js <<EOF
          window.__BUILD__ = {
            sha: '${{ github.sha }}',
            run: ${{ github.run_number }},
            branch: '${{ github.ref_name }}',
            dateUtc: '${DATE_UTC}'
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
