name: Deploy to GitHub Pages

# Build runs on every branch push so each branch's artifacts
# carry real build/branch/sha/run info in assets/build.js (the
# Stamp Build Info step). Deploy is gated to refs/heads/main —
# GitHub Pages can only host one site, so non-main branches just
# build for stamp parity (consumed by visual tests, manual
# downloads of the upload-pages-artifact, etc).

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Per-ref so feature branches don't cancel main deploys (and
  # vice versa). Without this, a fast main push during a feature
  # branch build would abort the feature build with no record.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build docs
        # mkdocs.yml at repo root reads docs/ and writes book/.
        # The output rides along in the upload-pages-artifact below
        # since `path: .` ships the whole working tree, so the book
        # is reachable at /microbes/book/ on the deployed site.
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stamp build info
        run: |
          DATE_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Write build.js as a fallback (kept for local serving and
          # for the script tag that still references it if the inline
          # injection below ever fails to match).
          cat > assets/build.js <<EOF
          window.__BUILD__ = {
            sha: '${{ github.sha }}',
            run: ${{ github.run_number }},
            branch: '${{ github.ref_name }}',
            dateUtc: '${DATE_UTC}'
          };
          EOF
          # Inline the build info directly into index.html, replacing
          # the <script src="assets/build.js"></script> tag. Prior
          # PRs tried a separate build.js + cache-buster URL but the
          # user's browser still served a stale 'dev' placeholder
          # across multiple deploys. Inlining puts the build info in
          # the same response as the HTML, so the short Pages cache
          # on HTML controls both, and there's nothing to cache
          # separately.
          INLINE="<script>window.__BUILD__ = { sha: '${{ github.sha }}', run: ${{ github.run_number }}, branch: '${{ github.ref_name }}', dateUtc: '${DATE_UTC}' };</script>"
          # Use awk for the substitution so we don't fight sed's
          # delimiter / escaping rules around the quotes + braces.
          INLINE="$INLINE" awk '
            /<script src="assets\/build\.js"><\/script>/ {
              print ENVIRON["INLINE"];
              next;
            }
            { print }
          ' index.html > /tmp/index.html.stamped
          mv /tmp/index.html.stamped index.html
          # Echo the result into the workflow log so the next time
          # a "build info says dev" report comes in we can confirm
          # at a glance whether the stamp ran.
          echo "--- assets/build.js after stamp ---"
          cat assets/build.js
          echo "--- index.html inline build tag ---"
          grep -F 'window.__BUILD__' index.html || true
          # Fail loudly if the inline injection didn't happen or
          # the placeholder still appears in build.js. Catches
          # workflow regressions before they ship.
          if grep -q "sha: 'dev'" assets/build.js; then
            echo "::error::Stamp step failed - assets/build.js still contains the 'dev' placeholder"
            exit 1
          fi
          if ! grep -qF 'window.__BUILD__' index.html; then
            echo "::error::Inline stamp failed - index.html does not contain window.__BUILD__"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    # Only main actually publishes to GitHub Pages — feature
    # branches build (above) to stamp build.js with their branch
    # name but skip the deploy step.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
