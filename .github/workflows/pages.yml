name: Deploy to GitHub Pages

# Build runs on every branch push so each branch's artifacts
# carry real build/branch/sha/run info in assets/build.js (the
# Stamp Build Info step). Deploy is gated to refs/heads/main —
# GitHub Pages can only host one site, so non-main branches just
# build for stamp parity (consumed by visual tests, manual
# downloads of the upload-pages-artifact, etc).

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Per-ref so feature branches don't cancel main deploys (and
  # vice versa). Without this, a fast main push during a feature
  # branch build would abort the feature build with no record.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build docs
        # mkdocs.yml at repo root reads docs/ and writes book/.
        # The output rides along in the upload-pages-artifact below
        # since `path: .` ships the whole working tree, so the book
        # is reachable at /microbes/book/ on the deployed site.
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stamp build info
        run: |
          DATE_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > assets/build.js <<EOF
          window.__BUILD__ = {
            sha: '${{ github.sha }}',
            run: ${{ github.run_number }},
            branch: '${{ github.ref_name }}',
            dateUtc: '${DATE_UTC}'
          };
          EOF
          # Cache-bust the build.js script tag so the user's browser
          # always fetches the freshly-stamped file instead of the
          # placeholder it may have cached from a previous deploy.
          # The run number changes every build and is unique per
          # workflow run, so the URL is guaranteed to be new.
          sed -i "s|src=\"assets/build.js\"|src=\"assets/build.js?v=${{ github.run_number }}\"|" index.html
          # Echo the result into the workflow log so the next time
          # a "build info says dev" report comes in we can confirm
          # at a glance whether the stamp ran. If this prints the
          # placeholder, the stamp step has a real problem; if it
          # prints the real values, the issue is downstream
          # (artifact upload, deploy, or browser cache).
          echo "--- assets/build.js after stamp ---"
          cat assets/build.js
          echo "--- index.html build.js script tag ---"
          grep 'assets/build\.js' index.html || true
          # Fail loudly if the stamp didn't actually replace the
          # placeholder. Catches workflow regressions before the
          # broken artifact ships to Pages.
          if grep -q "sha: 'dev'" assets/build.js; then
            echo "::error::Stamp step failed - assets/build.js still contains the 'dev' placeholder"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    # Only main actually publishes to GitHub Pages — feature
    # branches build (above) to stamp build.js with their branch
    # name but skip the deploy step.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
