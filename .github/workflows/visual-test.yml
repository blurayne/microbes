name: Visual tests (Playwright)

# Gates renderer + cell-port changes on PRs only. We do NOT run on
# `push: main` — main is what the PR was merged INTO; running again
# adds no signal and historically caused two-stage failures (push
# fails AFTER the merge succeeded, leaving a red badge on main with
# no fix-it path). The Pages-deploy workflow handles main-push CI.
#
# The visual suite is currently advisory: the baseline set lives at
# tests/visual/baselines/ and is populated incrementally by per-cell
# port PRs (Plan 13 — see .claude/plan/13-shader-test-visuals.md).
# Until the baseline set is non-empty, `continue-on-error: true`
# keeps the CI badge informational so unrelated PRs aren't blocked.
on:
  pull_request:
    paths:
      - 'assets/**'
      - 'docs/cell-zoo.html'
      - 'docs/shader-test.html'
      - 'tests/visual/**'
      - 'index.html'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/visual-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Advisory until baselines exist. Flip to `false` (default) once
    # the first per-cell port PR lands `tests/visual/baselines/*.png`.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` is faster + deterministic now that package-lock.json
      # ships from PR #193. Falls back to `npm install` if no lock.
      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Count baselines
        id: baselines
        run: |
          n=$(find tests/visual/baselines -type f -name '*.png' 2>/dev/null | wc -l)
          echo "count=$n" >> "$GITHUB_OUTPUT"
          echo "Baseline count: $n"

      # If baselines is empty, skip the full Playwright run — there's
      # nothing to diff yet. Just smoke-test that the harness wires
      # up (config + spec parse) and exit clean.
      - name: Smoke (no baselines yet)
        if: steps.baselines.outputs.count == '0'
        run: |
          echo "No baselines committed — skipping pixel diffs."
          echo "Verifying Playwright config + spec parse only."
          npx playwright test --list

      - name: Run visual tests
        if: steps.baselines.outputs.count != '0'
        env:
          CI: true
        run: npm run test:visual

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
