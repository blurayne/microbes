name: Visual tests (Playwright)

# PAUSED — disabled on PR + push. Re-enable by restoring the
# `pull_request:` block below once the prerequisites are
# adjusted (see PR #199 + the diff-result discussion in the
# session that introduced this pause). `workflow_dispatch`
# remains so the rig can still be triggered manually from the
# Actions UI for one-off diagnostics.
#
# When re-enabling:
#   1. Restore the `pull_request:` block + its paths filter.
#   2. Decide whether to keep `continue-on-error: true` (advisory)
#      or flip to gating.
#   3. Bring `MAX_DIFF_RATIO` in tests/visual/game-vs-shader-test.spec.js
#      down once cell ports narrow divergence below it.
on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - 'assets/**'
  #     - 'docs/cell-zoo.html'
  #     - 'docs/shader-test.html'
  #     - 'tests/visual/**'
  #     - 'index.html'
  #     - 'playwright.config.js'
  #     - 'package.json'
  #     - 'package-lock.json'
  #     - '.github/workflows/visual-test.yml'

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Advisory until divergence narrows. Failing pairs still upload
    # diff PNGs as artifacts so the PR author can see what's off.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Chromium + system deps
        run: npx playwright install --with-deps chromium

      # Pair-diff against shader-test runs unconditionally — no
      # baseline dependency. Cells that exceed the diff threshold
      # are the candidates for the next per-cell port PR.
      - name: Game ↔ shader-test pair-diff
        env:
          CI: true
        run: npm run test:visual:diff

      # Historical baselines (cells.spec.js). Smoke-skip when none
      # exist yet — per-cell port PRs grow this set.
      - name: Count baselines
        id: baselines
        run: |
          n=$(find tests/visual/baselines -type f -name '*.png' 2>/dev/null | wc -l)
          echo "count=$n" >> "$GITHUB_OUTPUT"
          echo "Baseline count: $n"

      - name: Baseline-diff (cells.spec.js)
        if: steps.baselines.outputs.count != '0'
        env:
          CI: true
        run: npx playwright test tests/visual/cells.spec.js

      # Always upload report + diff artifacts so reviewers can see
      # the side-by-side composites the pair-diff spec attaches on
      # both pass + fail (the spec attaches unconditionally).
      - name: Upload Playwright report + diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
