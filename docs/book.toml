# md2book configuration.
#
# Placeholder using mdbook-style keys. The plan picked the
# multi-MD-with-TOC flavour; if the chosen md2book package uses
# different config keys (e.g. JSON / package.json fields), only this
# file changes — everything else (SUMMARY.md, chapter MD files,
# stylesheets) is tool-agnostic.

[book]
title = "Immunsystem · Game Design Document v10"
authors = ["microbes contributors"]
language = "de"
description = "Erweiterte Komplettfassung — 12 Immunzellen, 12 Pathogene, 5 Bosse, 18 Levels, adaptiver Codex."
src = "."

[output.html]
# Layout/animation fidelity comes from the original stylesheet
# extracted verbatim into assets/style.css. print.css is loaded with
# media="print" so on-screen design is untouched.
additional-css = ["assets/style.css", "assets/print.css"]

# Mermaid CDN is referenced from the original document; injected via
# the book template head so diagrams in any chapter render.
additional-js = []
