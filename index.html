<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Microbes</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <button id="gear" type="button" aria-label="Settings" title="Settings">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9.4 4.9-.05.6 2.05 1.6-2 3.46-2.42-.97a7.7 7.7 0 0 1-1.04.6l-.36 2.57h-4l-.36-2.57a7.7 7.7 0 0 1-1.04-.6l-2.42.97-2-3.46L9.8 13.5a7.6 7.6 0 0 1 0-3l-2.05-1.6 2-3.46 2.42.97c.33-.23.68-.43 1.04-.6L13.58 3h4l.36 2.57c.36.17.71.37 1.04.6l2.42-.97 2 3.46-2.05 1.6c.06.4.06.8.05 1.24Z"/>
    </svg>
  </button>

  <div id="settings" class="hidden" role="dialog" aria-label="Settings" aria-modal="false">
    <div class="settings-backdrop" data-close></div>
    <aside class="settings-panel">
      <header>
        <h2>Settings</h2>
        <button type="button" class="close" data-close aria-label="Close">&times;</button>
      </header>

      <section>
        <h3>Theme</h3>
        <select id="themeSelect"></select>
      </section>

      <section>
        <h3>Gameplay</h3>
        <label><input type="checkbox" id="allowBadGuys" /> Allow pathogens</label>
      </section>

      <section>
        <h3>Splitting</h3>
        <label><input type="checkbox" id="splitOnTap" /> Split on tap</label>
        <label><input type="checkbox" id="randomSplit" /> Random splitting</label>
      </section>

      <section>
        <h3>Split mode</h3>
        <label><input type="radio" name="splitMode" value="pushApart" /> Push apart with momentum</label>
        <label><input type="radio" name="splitMode" value="bondDrift" /> Bond, then drift</label>
      </section>

      <section>
        <h3>Population</h3>
        <label>Max cells <span id="maxCellsVal" class="val"></span>
          <input type="range" id="maxCells" min="2" max="128" step="1" />
        </label>
        <label>Auto-split (s) <span id="autoVal" class="val"></span>
          <input type="range" id="autoSplitSeconds" min="2" max="30" step="1" />
        </label>
      </section>

      <section>
        <h3>Physics</h3>
        <label>Friction <span id="frictionVal" class="val"></span>
          <input type="range" id="friction" min="0" max="1" step="0.01" />
        </label>
        <label>Bounce <span id="bounceVal" class="val"></span>
          <input type="range" id="bounce" min="0" max="1" step="0.01" />
        </label>
        <label>Throw strength <span id="throwVal" class="val"></span>
          <input type="range" id="throwStrength" min="0" max="3" step="0.05" />
        </label>
      </section>

      <section>
        <h3>Cell blending</h3>
        <select id="blendMode">
          <option value="source-over">None</option>
          <option value="overlay">Overlay (default)</option>
          <option value="multiply">Multiply</option>
          <option value="darken">Darken</option>
          <option value="lighter">Add (Lighter)</option>
          <option value="screen">Screen</option>
          <option value="soft-light">Soft light</option>
          <option value="hard-light">Hard light</option>
          <option value="color-burn">Color burn</option>
          <option value="color-dodge">Color dodge</option>
        </select>
      </section>

      <section>
        <h3>Look</h3>
        <label>Wobble <span id="wobbleVal" class="val"></span>
          <input type="range" id="wobbleAmp" min="0" max="0.4" step="0.01" />
        </label>
        <label>Background flow <span id="bgVal" class="val"></span>
          <input type="range" id="bgFlowSpeed" min="0" max="2" step="0.05" />
        </label>
        <label>Outline px <span id="outVal" class="val"></span>
          <input type="range" id="outlinePx" min="1" max="10" step="1" />
        </label>
        <label>Membrane <span id="membraneVal" class="val"></span>
          <input type="range" id="membraneIntensity" min="0" max="1" step="0.05" />
        </label>
        <label>Cell size <span id="cellSizeVal" class="val"></span>
          <input type="range" id="cellSizeMul" min="0.4" max="2.0" step="0.05" />
        </label>
        <label><input type="checkbox" id="cartoon" /> Cartoon mode (faces)</label>
        <label><input type="checkbox" id="showFPS" /> Show FPS</label>
        <label><input type="checkbox" id="showDebugField" /> Show metaball field</label>
      </section>

      <section class="actions">
        <button type="button" id="resetSim">Reset simulation</button>
      </section>
    </aside>
  </div>

  <button id="help" class="fab" type="button" aria-label="Help" title="Help">?</button>
  <button id="paletteBad" class="fab fab-bad" type="button" aria-label="Add pathogen" title="Add a pathogen">✚</button>
  <button id="palette" class="fab" type="button" aria-label="Add cell" title="Add a cell">+</button>
  <button id="reload" class="fab" type="button" aria-label="Reload" title="Hard reload">⟳</button>

  <div id="helpDialog" class="dialog hidden" role="dialog" aria-label="Cell help">
    <div class="dialog-backdrop" data-close></div>
    <aside class="dialog-panel">
      <header>
        <h2>Cells of the immune system</h2>
        <button type="button" class="close" data-close aria-label="Close">&times;</button>
      </header>
      <ul id="cellList" class="cell-list"></ul>
    </aside>
  </div>

  <div id="paletteDialog" class="dialog hidden" role="dialog" aria-label="Add cell">
    <div class="dialog-backdrop" data-close></div>
    <aside class="dialog-panel">
      <header>
        <h2>Add a cell</h2>
        <button type="button" class="close" data-close aria-label="Close">&times;</button>
      </header>
      <div id="cellGrid"></div>
    </aside>
  </div>

  <div id="paletteBadDialog" class="dialog hidden" role="dialog" aria-label="Add pathogen">
    <div class="dialog-backdrop" data-close></div>
    <aside class="dialog-panel">
      <header>
        <h2>Add a pathogen</h2>
        <button type="button" class="close" data-close aria-label="Close">&times;</button>
      </header>
      <div id="cellGridBad"></div>
    </aside>
  </div>

  <div id="fps" aria-hidden="true"></div>

  <div id="addBadge" role="status" aria-live="polite">
    <span id="addBadgeLabel">Adding</span>
    <button type="button" id="addBadgeCancel" class="x" aria-label="Cancel add">&times;</button>
  </div>

  <div id="build" aria-hidden="true"></div>

  <script src="assets/build.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
